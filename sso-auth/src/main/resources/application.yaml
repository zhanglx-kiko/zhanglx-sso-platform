server:
  port: 9000

spring:
  profiles:
    active: dev
  application:
    name: sso-auth
  messages:
    # 逗号分隔所有的 basename
    basename: i18n/common,i18n/auth-messages,i18n/sso-messages
    encoding: UTF-8
  # Redis 配置 (请修改为你的实际地址)
  data:
    redis:
      host: 192.168.3.130
      port: 6379
      database: 0
      password: P@ssw0rd!23  # 替换为你的Redis密码（空密码则注释）
      timeout: 5000ms          # Redis连接超时
      # 连接池配置（必加，提升Redis连接效率）
      lettuce:
        pool:
          max-active: 8        # 最大连接数
          max-idle: 8          # 最大空闲连接
          min-idle: 2          # 最小空闲连接
          max-wait: 1000ms     # 连接等待超时
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # rewriteBatchedStatements=true 批处理
    url: jdbc:mysql://192.168.3.130:3306/sso_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: P@ssw0rd!23
    # HikariCP 连接池配置优化 (JDK 25 虚拟线程下高并发优化)
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      pool-name: SsoHikariCP
      max-lifetime: 1800000
      connection-timeout: 5000
  #sql:
    #init:
      #schema-locations: classpath:db/schema-h2.sql
      #data-locations: classpath:db/data-h2.sql
  # 全局启用虚拟线程支持（Spring Boot4.0+ 核心配置）
  threads:
    virtual:
      enabled: true
  web:
    error:
      include-message: always  # 显示错误信息
      include-binding-errors: always  # 显示参数校验错误信息
  main:
    allow-bean-definition-overriding: true

# Flyway 配置
flyway:
  enabled: false
  baseline-on-migrate: true
  baseline-version: 0
  locations: classpath:db/migration
  encoding: UTF-8
  validate-on-migrate: true
  clean-disabled: false
  table: flyway_schema_history

logging:
  level:
    root: INFO
    com.zhanglx.sso: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG
    org.springframework.boot: DEBUG
    org.springframework.context: DEBUG

# MyBatis Plus 配置
mybatis-plus:
  #mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhanglx.sso.auth.domain.po
  configuration:
    map-underscore-to-camel-case: true # 开启下划线转驼峰
    auto-mapping-behavior: FULL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境开启SQL日志
  global-config:
    db-config:
      # 【核心修改】改为 NOT_NULL，防止 updateById 时将未赋值的字段强行覆盖为 NULL
      insert-strategy: NOT_NULL
      update-strategy: NOT_NULL
      # 【核心修改】仅保留删除字段和未删除状态，彻底废弃静态的 logic-delete-value
      logic-delete-field: delFlag
      logic-not-delete-value: 0L

# sa-token 配置
sa-token:
  # OAuth2.0 配置
  oauth2-server:
    # 定义哪些 scope 是高级权限，多个用逗号隔开
    higher-scope: openid,userid
    # 定义哪些 scope 是低级权限，多个用逗号隔开
    lower-scope: userinfo
    not-login-view: /notLogin
  # token 名称 (前端请求头需要带上这个名称)
  token-name: token
  # token 有效期 (单位: 秒) - 30天
  timeout: 2592000
  # token 临时有效期 (指定时间内无操作就视为过期) - 30分钟
  active-timeout: 1800
  # 是否允许同一账号并发登录 (为 true 时允许一起登录, 为 false 时新登录挤掉旧登录)
  # 【注意】这里必须设为 true，具体的“挤人”逻辑我们在代码里控制，以满足你的“灵活配置”需求
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token (为 true 时所有登录共用一个 token, 为 false 时每次登录产生新 token)
  is-share: false
  # token 风格
  token-style: uuid
  # 是否从 cookie 中读取 token (支持 B/S)
  is-read-cookie: true
  # 是否从 header 中读取 token (支持 C/S)
  is-read-header: true
  # Same-Token 的配置（所有微服务保持一致）
  same-token:
    # 秘钥，所有微服务共用这个秘钥
    secret-key: pRZS!2k$F9aG7dJ53h8
    # Same-Token 的有效期（秒），稍微设置长一点容忍时钟差异，如 5 分钟
    timeout: 300

default:
  password: 123456

# Argon2加密配置
security:
  argon2:
    # 单次哈希最大耗时（高并发建议300-500ms，平衡安全和性能）
    max-hash-time-ms: 500
    # 初始内存（log2值，16=65536KB，即64MB）
    initial-memory: 16
    # 并行度（建议等于CPU核心数）
    parallelism: 4
    # 哈希输出长度（字节）
    output-length: 32
    # Pepper 全局密钥
    pepper: pR7$S2kF9!aG5dJ3hZ8
    # Salt 长度（默认64字节）
    salt-length: 32


# SpringDoc / Knife4j 配置
springdoc:
  # get请求多参数时不需要添加额外的@ParameterObject和@Parameter注解
  default-flat-param-object: true
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 标签的排序方式 alpha:按照子母顺序排序（@ApiSupport注解排序不生效，因此需要设置）
    tags-sorter: alpha
    # 接口的排序方式 alpha:按照子母顺序排序（@ApiOperationSupport注解排序生效，因此这里不作设置）
    operations-sorter: alpha
  group-configs:
    - group: "认证服务"
      paths-to-match: "/**"
      packages-to-scan: "com.zhanglx.sso.auth.controller"

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-dynamic-parameter: false
    enable-document-manage: true
    swagger-model-name: 实体类列表
    enable-footer: true
    enable-footer-custom: true
    footer-custom-content: Apache 2.0 | Copyright © 2026 ZhangLX
