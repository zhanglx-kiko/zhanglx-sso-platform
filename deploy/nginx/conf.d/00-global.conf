geo $edge_whitelist {
    default 0;
    127.0.0.1/32 1;
    ::1/128 1;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
}

geo $edge_blacklist {
    default 0;
    # Add abusive IPs here when needed, for example:
    # 203.0.113.10/32 1;
}

map $edge_whitelist $limit_key_ip {
    1 "";
    0 $binary_remote_addr;
}

map $edge_whitelist $limit_key_ip_uri {
    1 "";
    0 "$binary_remote_addr:$request_method:$uri";
}

limit_req_zone $limit_key_ip zone=login_ip_zone:20m rate=5r/m;
limit_req_zone $limit_key_ip zone=session_ip_zone:20m rate=60r/m;
limit_req_zone $limit_key_ip zone=admin_read_ip_zone:20m rate=120r/m;
limit_req_zone $limit_key_ip zone=public_ip_zone:20m rate=120r/m;
limit_req_zone $limit_key_ip zone=import_export_ip_zone:20m rate=2r/m;
limit_req_zone $limit_key_ip_uri zone=admin_write_ip_uri_zone:20m rate=20r/m;
limit_conn_zone $limit_key_ip zone=conn_per_ip:20m;

upstream sso_gateway_backend {
    # Replace this address when the gateway is not running on the host machine.
    # For Linux Docker hosts, docker-compose already injects host.docker.internal.
    server host.docker.internal:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# Trust only known reverse proxies and load balancers.
# Never trust arbitrary client-sent X-Forwarded-For values from the public Internet.
set_real_ip_from 127.0.0.1;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 100.64.0.0/10;
real_ip_header X-Forwarded-For;
real_ip_recursive on;
