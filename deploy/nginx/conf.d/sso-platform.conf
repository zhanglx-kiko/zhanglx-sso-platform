server {
    listen 80 default_server;
    server_name _;

    limit_req_status 429;
    limit_conn_status 429;
    limit_conn conn_per_ip 50;

    proxy_intercept_errors on;
    error_page 403 = @json_403;
    error_page 413 = @json_413;
    error_page 429 = @json_429;
    error_page 500 502 503 504 = @json_5xx;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-Id $request_id always;

    if ($edge_blacklist) {
        return 403;
    }

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"code":0,"msg":"ok","data":"nginx"}';
    }

    location ~ ^/apis/v1/auth(/s)?/login$ {
        limit_req zone=login_ip_zone burst=3 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ~ ^/apis/v1/auth(/s)?/logout$ {
        limit_req zone=session_ip_zone burst=10 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ~ ^/apis/v1/auth(/s)?/current-user$ {
        limit_req zone=session_ip_zone burst=20 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location = /apis/v1/auth/s/users/page {
        limit_req zone=admin_read_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location = /apis/v1/auth/s/permissions/by-identification {
        limit_req zone=admin_read_ip_zone burst=20 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ~ ^/apis/v1/auth/s/users(/[^/]+)?$ {
        limit_req zone=admin_write_ip_uri_zone burst=5 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ~ ^/apis/v1/auth/s/user/reset-password/[^/]+$ {
        limit_req zone=admin_write_ip_uri_zone burst=3 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /apis/v1/auth/s/roles {
        limit_req zone=admin_write_ip_uri_zone burst=10 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /apis/v1/auth/s/menus {
        limit_req zone=admin_write_ip_uri_zone burst=10 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /apis/v1/auth/s/permissions {
        limit_req zone=admin_write_ip_uri_zone burst=10 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /apis/v1/auth/s/config {
        limit_req zone=admin_write_ip_uri_zone burst=5 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /apis/v1/auth/s/bindings {
        limit_req zone=admin_write_ip_uri_zone burst=5 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ~ ^/apis/v1/auth/s/.+/(import|export)$ {
        limit_req zone=import_export_ip_zone burst=1 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location = /swagger-ui.html {
        limit_req zone=public_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location = /doc.html {
        limit_req zone=public_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /swagger-ui/ {
        limit_req zone=public_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /v3/api-docs/ {
        limit_req zone=public_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location / {
        limit_req zone=public_ip_zone burst=30 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location @json_403 {
        internal;
        default_type application/json;
        return 403 '{"code":403,"msg":"访问被拒绝","data":null}';
    }

    location @json_413 {
        internal;
        default_type application/json;
        return 413 '{"code":413,"msg":"请求体过大，请缩小上传内容","data":null}';
    }

    location @json_429 {
        internal;
        default_type application/json;
        add_header Retry-After 60 always;
        return 429 '{"code":429,"msg":"请求过于频繁，请稍后再试","data":null}';
    }

    location @json_5xx {
        internal;
        default_type application/json;
        return 503 '{"code":503,"msg":"上游服务暂不可用，请稍后再试","data":null}';
    }
}
